<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pengaturan - Owner Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: #1e2a3a;
            min-height: 100vh;
        }
        /* Login overlay */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            width: 320px;
            text-align: center;
        }
        .login-card button {
            width: 100%;
            padding: 0.7rem;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        /* Container utama */
        .settings-page {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        /* Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1e3a5f;
        }
        .header-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        .refresh-btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        .update-badge {
            background: #eef2f7;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #1e2a3a;
        }
        /* Kartu pengaturan */
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eef2f6;
        }
        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #1e3a5f;
            border-bottom: 1px solid #eef2f6;
            padding-bottom: 0.5rem;
        }
        .csv-url {
            display: block;
            background: #f8f9fa;
            padding: 0.75rem;
            font-size: 0.75rem;
            word-break: break-all;
            margin: 1rem 0;
            border-radius: 8px;
            border: 1px solid #eef2f6;
            font-family: monospace;
        }
        .btn-secondary {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-secondary:hover {
            background: #0f2b44;
        }
        .info-text {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #6c757d;
            text-align: center;
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            text-decoration: none;
            color: #1e3a5f;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="loginOverlay" class="login-overlay" style="display: none;">
        <div class="login-card">
            <h2>Akses Diperlukan</h2>
            <p>Silakan login terlebih dahulu</p>
            <button id="redirectLoginBtn">Kembali ke Login Dashboard</button>
        </div>
    </div>

    <div id="settingsContainer" class="settings-page">
        <div class="page-header">
            <h1>Enterprise Dashboard</h1>
            <div class="header-actions">
                <button id="refreshTopBtn" class="refresh-btn">⟳ Refresh</button>
                <span id="lastUpdateBadge" class="update-badge">Update: --</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">⚙️ Pengaturan Dashboard</div>
            <p>Dashboard terhubung ke Google Sheets (CSV publik).</p>
            <p>URL CSV:</p>
            <code id="csvUrlDisplay" class="csv-url"></code>
            <button id="refreshDataBtn" class="btn-secondary">Refresh Data Sekarang</button>
            <div id="statusMessage" class="info-text"></div>
        </div>

        <a href="../../index.html" class="back-link">← Kembali ke Dashboard Utama</a>
    </div>

    <script>
        // Konfigurasi
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5xtxnptjxh-FIyJuBoCct5vudZFFOeaisUUhT8X0R0kjAkY3f2CtD45CYcZjnPxGh52Og7_AXA756/pub?output=csv';

        // Cek login
        function checkLogin() {
            const loggedIn = sessionStorage.getItem('owner_logged_in');
            if (loggedIn === 'true') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('settingsContainer').style.display = 'block';
                loadSettings();
                updateTimestamp();
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('settingsContainer').style.display = 'none';
            }
        }

        function loadSettings() {
            document.getElementById('csvUrlDisplay').innerText = CSV_URL;
        }

        function updateTimestamp() {
            const now = new Date();
            const formatted = now.toLocaleString('id-ID', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
            document.getElementById('lastUpdateBadge').innerHTML = `Update: ${formatted}`;
        }

        async function refreshData() {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = '⏳ Memuat ulang data...';
            try {
                const response = await fetch(CSV_URL);
                if (response.ok) {
                    statusDiv.innerHTML = '✅ Data berhasil di-refresh! Data lowongan terbaru telah dimuat.';
                    updateTimestamp();
                } else {
                    statusDiv.innerHTML = '❌ Gagal refresh data. Periksa koneksi atau URL CSV.';
                }
            } catch (error) {
                statusDiv.innerHTML = '❌ Error: ' + error.message;
            }
            setTimeout(() => {
                if (statusDiv.innerHTML.includes('berhasil') || statusDiv.innerHTML.includes('Gagal') || statusDiv.innerHTML.includes('Error')) {
                    statusDiv.innerHTML = '';
                }
            }, 3000);
        }

        function redirectToLogin() {
            window.location.href = '../../index.html';
        }

        // Event listeners
        document.getElementById('refreshDataBtn').addEventListener('click', refreshData);
        document.getElementById('refreshTopBtn').addEventListener('click', refreshData);
        document.getElementById('redirectLoginBtn').addEventListener('click', redirectToLogin);

        // Inisialisasi
        checkLogin();
    </script>
</body>
</html>
