<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semua Lowongan - Loker Kendari</title>
    <meta name="description" content="Daftar semua lowongan kerja terbaru di Kendari dan Sulawesi Tenggara.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://lokerkendariofficial.github.io/loker-kendari/lowongan.html">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="assets/images/logo12_26_15436.png" alt="Loker Kendari" width="200" height="60">
        </div>
        <nav>
            <a href="/">Beranda</a>
            <a href="lowongan.html">Lowongan</a>
            <a href="kontak.html">Kontak</a>
            <a href="pasang.html">Pasang Iklan</a>
            <a href="profil.html">Profil</a>
        </nav>
    </header>

    <main class="container">
        <div class="filter-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Cari judul atau perusahaan...">
                <button id="searchBtn">Cari</button>
            </div>
            <div class="categories" id="categories">
                <button class="category-btn active" data-cat="all">Semua</button>
                <button class="category-btn" data-cat="IT & Teknologi">IT & Teknologi</button>
                <button class="category-btn" data-cat="Pemasaran">Pemasaran</button>
                <button class="category-btn" data-cat="Administrasi">Administrasi</button>
                <button class="category-btn" data-cat="Pendidikan">Pendidikan</button>
                <button class="category-btn" data-cat="Lainnya">Lainnya</button>
            </div>
        </div>

        <div class="job-grid" id="jobGrid">
            <p>Memuat lowongan...</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Loker Kendari Official. <a href="privacy.html">Kebijakan Privasi</a> | <a href="sitemap.xml">Sitemap</a></p>
    </footer>

    <script>
        let jobsData = [];

        // URL CSV dari Google Sheets (sama dengan index.html)
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5xtxnptjxh-FIyJuBoCct5vudZFFOeaisUUhT8X0R0kjAkY3f2CtD45CYcZjnPxGh52Og7_AXA756/pub?output=csv';

        async function loadJobs() {
            const jobGrid = document.getElementById('jobGrid');
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('Gagal mengambil data');
                const csvText = await response.text();
                const rows = csvText.split('\n').filter(row => row.trim() !== '');
                
                if (rows.length < 2) {
                    jobGrid.innerHTML = `
                        <div style="text-align:center; padding:2rem;">
                            <p>✨ Belum ada lowongan terpasang.</p>
                            <p><a href="pasang.html" class="btn" style="margin-top:1rem;">📢 Pasang Iklan Lowongan</a></p>
                        </div>`;
                    return;
                }

                const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
                const colIdx = {
                    perusahaan: headers.findIndex(h => h.includes('nama perusahaan') || h.includes('perusahaan')),
                    posisi: headers.findIndex(h => h.includes('posisi') || h.includes('judul')),
                    lokasi: headers.findIndex(h => h.includes('lokasi')),
                    deskripsi: headers.findIndex(h => h.includes('deskripsi')),
                    gaji: headers.findIndex(h => h.includes('gaji') || h.includes('sistem')),
                    deadline: headers.findIndex(h => h.includes('deadline') || h.includes('batas')),
                    timestamp: headers.findIndex(h => h.includes('timestamp'))
                };

                jobsData = rows.slice(1).map(row => {
                    const cols = row.split(',');
                    return {
                        title: (colIdx.posisi !== -1 && cols[colIdx.posisi]) ? cols[colIdx.posisi].trim() : 'Lowongan',
                        company: (colIdx.perusahaan !== -1 && cols[colIdx.perusahaan]) ? cols[colIdx.perusahaan].trim() : 'Perusahaan',
                        location: (colIdx.lokasi !== -1 && cols[colIdx.lokasi]) ? cols[colIdx.lokasi].trim() : 'Kendari',
                        deadline: (colIdx.deadline !== -1 && cols[colIdx.deadline]) ? cols[colIdx.deadline].trim() : 'Segera',
                        description: (colIdx.deskripsi !== -1 && cols[colIdx.deskripsi]) ? cols[colIdx.deskripsi].trim() : '',
                        salary: (colIdx.gaji !== -1 && cols[colIdx.gaji]) ? cols[colIdx.gaji].trim() : 'Nego',
                        link: '#',
                        date_posted: (colIdx.timestamp !== -1 && cols[colIdx.timestamp]) ? cols[colIdx.timestamp].split(' ')[0] : 'Baru'
                    };
                }).filter(job => job.title && job.title !== 'Lowongan');

                if (jobsData.length === 0) {
                    jobGrid.innerHTML = `<div style="text-align:center; padding:2rem;"><p>Belum ada lowongan. <a href="pasang.html">Pasang iklan</a> sekarang.</p></div>`;
                } else {
                    renderJobs(jobsData);
                }
            } catch (error) {
                console.error('Error:', error);
                jobGrid.innerHTML = `
                    <div style="text-align:center; padding:2rem;">
                        <p>⚠️ Gagal memuat lowongan. Pastikan koneksi internet lancar.</p>
                        <p><button onclick="location.reload()" class="btn">Refresh Halaman</button></p>
                    </div>`;
            }
        }

        function renderJobs(jobs) {
            const jobGrid = document.getElementById('jobGrid');
            jobGrid.innerHTML = '';
            jobs.forEach(job => {
                const jobCard = document.createElement('article');
                jobCard.className = 'job-card';
                jobCard.innerHTML = `
                    <h3>${escapeHtml(job.title)}</h3>
                    <div class="company">${escapeHtml(job.company)} - ${escapeHtml(job.location)}</div>
                    <div class="salary">💰 ${escapeHtml(job.salary)}</div>
                    <div class="deadline">📅 Deadline: ${escapeHtml(job.deadline)}</div>
                    <p>${escapeHtml(job.description.substring(0, 120))}${job.description.length > 120 ? '…' : ''}</p>
                    <div class="meta">
                        <a href="${escapeHtml(job.link)}" class="btn" aria-label="Detail lowongan ${escapeHtml(job.title)}">Detail →</a>
                        <span class="date-posted">${escapeHtml(job.date_posted)}</span>
                    </div>
                `;
                jobGrid.appendChild(jobCard);
            });
        }

        function filterJobs() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const activeCategory = document.querySelector('.category-btn.active').getAttribute('data-cat');
            const filtered = jobsData.filter(job => {
                const matchSearch = job.title.toLowerCase().includes(searchTerm) || job.company.toLowerCase().includes(searchTerm);
                let matchCategory = (activeCategory === 'all');
                if (!matchCategory) {
                    matchCategory = (job.category && job.category === activeCategory);
                }
                return matchSearch && matchCategory;
            });
            renderJobs(filtered);
        }

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterJobs();
            });
        });
        document.getElementById('searchBtn').addEventListener('click', filterJobs);
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') filterJobs();
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        loadJobs();
    </script>
</body>
</html>
