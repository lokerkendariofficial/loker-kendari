<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semua Lowongan - Loker Kendari</title>
    <meta name="description" content="Daftar semua lowongan kerja terbaru di Kendari dan Sulawesi Tenggara.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://lokerkendariofficial.github.io/loker-kendari/lowongan.html">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="assets/images/logo12_26_15436.png" alt="Loker Kendari" width="200" height="60">
        </div>
        <nav>
            <a href="/">Beranda</a>
            <a href="lowongan.html">Lowongan</a>
            <a href="kontak.html">Kontak</a>
            <a href="pasang.html">Pasang Iklan</a>
            <a href="profil.html">Profil</a>
        </nav>
    </header>

    <main class="container">
        <div class="filter-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Cari judul atau perusahaan...">
                <button id="searchBtn">Cari</button>
            </div>
            <div class="categories" id="categories">
                <button class="category-btn active" data-cat="all">Semua</button>
                <button class="category-btn" data-cat="IT & Teknologi">IT & Teknologi</button>
                <button class="category-btn" data-cat="Pemasaran">Pemasaran</button>
                <button class="category-btn" data-cat="Administrasi">Administrasi</button>
                <button class="category-btn" data-cat="Pendidikan">Pendidikan</button>
                <button class="category-btn" data-cat="Lainnya">Lainnya</button>
            </div>
        </div>

        <div class="job-grid" id="jobGrid">
            <p>Memuat lowongan...</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Loker Kendari Official. <a href="privacy.html">Kebijakan Privasi</a> | <a href="sitemap.xml">Sitemap</a></p>
    </footer>

    <script>
        let jobsData = [];

        // URL Web App Google Apps Script (doGet) – hanya mengembalikan lowongan dengan status 'Published'
        const API_URL = 'https://script.google.com/macros/s/AKfycbyTnN21CN0LtEapwWhum1WYHm0G1Ku1dNZGtvQqypnkuvlgZOOF1UCB-cZMJcESDDNG/exec';

        async function loadJobs() {
            const jobGrid = document.getElementById('jobGrid');
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Gagal mengambil data');
                const data = await response.json();
                jobsData = data.lowongan || [];
                if (jobsData.length === 0) {
                    jobGrid.innerHTML = `
                        <div style="text-align:center; padding:2rem;">
                            <p>✨ Belum ada lowongan terpasang.</p>
                            <p><a href="pasang.html" class="btn" style="margin-top:1rem;">📢 Pasang Iklan Lowongan</a></p>
                        </div>`;
                    return;
                }
                renderJobs(jobsData);
            } catch (error) {
                console.error('Error:', error);
                jobGrid.innerHTML = `
                    <div style="text-align:center; padding:2rem;">
                        <p>⚠️ Gagal memuat lowongan. Pastikan koneksi internet lancar.</p>
                        <p><button onclick="location.reload()" class="btn">Refresh Halaman</button></p>
                    </div>`;
            }
        }

        function renderJobs(jobs) {
            const jobGrid = document.getElementById('jobGrid');
            jobGrid.innerHTML = '';
            jobs.forEach(job => {
                // Mapping nama kolom dari spreadsheet (sesuaikan jika perlu)
                const title = job['Posisi / Judul lowongan'] || job['Posisi'] || 'Lowongan';
                const company = job['Nama perusahaan/Toko'] || job['Perusahaan'] || 'Perusahaan';
                const location = job['Lokasi'] || 'Kendari';
                const deadline = job['Deadline'] || 'Segera';
                const description = job['Deskripsi'] || '';
                const salary = job['Sistem Gaji'] || job['Gaji'] || 'Nego';
                const datePosted = job['Timestamp'] ? job['Timestamp'].split(' ')[0] : 'Baru';
                
                const jobCard = document.createElement('article');
                jobCard.className = 'job-card';
                jobCard.innerHTML = `
                    <h3>${escapeHtml(title)}</h3>
                    <div class="company">${escapeHtml(company)} - ${escapeHtml(location)}</div>
                    <div class="salary">💰 ${escapeHtml(salary)}</div>
                    <div class="deadline">📅 Deadline: ${escapeHtml(deadline)}</div>
                    <p>${escapeHtml(description.substring(0, 120))}${description.length > 120 ? '…' : ''}</p>
                    <div class="meta">
                        <a href="#" class="btn" aria-label="Detail lowongan ${escapeHtml(title)}">Detail →</a>
                        <span class="date-posted">${escapeHtml(datePosted)}</span>
                    </div>
                `;
                jobGrid.appendChild(jobCard);
            });
        }

        function filterJobs() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const activeCategory = document.querySelector('.category-btn.active').getAttribute('data-cat');
            const filtered = jobsData.filter(job => {
                const title = job['Posisi / Judul lowongan'] || job['Posisi'] || '';
                const company = job['Nama perusahaan/Toko'] || job['Perusahaan'] || '';
                const matchSearch = title.toLowerCase().includes(searchTerm) || company.toLowerCase().includes(searchTerm);
                let matchCategory = (activeCategory === 'all');
                if (!matchCategory) {
                    const jobCategory = job['Kategori'] || 'Lainnya';
                    matchCategory = (jobCategory === activeCategory);
                }
                return matchSearch && matchCategory;
            });
            renderJobs(filtered);
        }

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterJobs();
            });
        });
        document.getElementById('searchBtn').addEventListener('click', filterJobs);
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') filterJobs();
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        loadJobs();
    </script>
</body>
</html>
